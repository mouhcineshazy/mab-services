name: MAB-SERVICES-CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel a running workflow if a newer commit arrives on the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint & type-check run in parallel ──────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit

  # ── Build only after lint + typecheck both pass ─────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    env:
      # Real secrets are not needed at build time — Cal.com and Resend are
      # only invoked at request time, not during static generation.
      # Cal.com vars are empty so getNextMasterclassSlot() returns null
      # gracefully and all Cal buttons fall back to their unconfigured state.
      NEXT_PUBLIC_BASE_URL: https://mabservices-ca.com
      NEXT_PUBLIC_CAL_USERNAME: ''
      NEXT_PUBLIC_CAL_EVENT_SLUG: ''
      NEXT_PUBLIC_CAL_CONSULTATION_SLUG: ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Cache the Next.js compilation artifacts — cuts rebuild time by ~60%
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**/*.ts', 'src/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-

      - run: npm ci
      - run: npm run build
